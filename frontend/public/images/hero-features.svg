  <text x="290" y="464" text-anchor="middle" font-size="9" fill="#888780">Users</text>
  <line x1="360" y1="432" x2="360" y2="462" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="450" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#1D9E75">50K+</text>
  <text x="450" y="464" text-anchor="middle" font-size="9" fill="#888780">Jobs Posted</text>
  <line x1="540" y1="432" x2="540" y2="462" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="620" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#D85A30">4.9★</text>
  <text x="620" y="464" text-anchor="middle" font-size="9" fill="#888780">App Rating</text>
