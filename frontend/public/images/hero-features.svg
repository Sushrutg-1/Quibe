  <text x="113" y="373" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Trending</text>
  <rect x="156" y="358" width="60" height="22" rx="11" fill="#E1F5EE"/>
  <text x="186" y="373" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">Design</text>

