  <text x="176" y="212" text-anchor="middle" font-size="10" fill="#444441">Quibe. Three months of work!</text>
  <!-- reactions -->
  <text x="82" y="238" font-size="10" fill="#888780">❤️ 124  💬 32  🔗 Share</text>
  <line x1="78" y1="248" x2="274" y2="248" stroke="#D3D1C7" stroke-width="0.5"/>
  <!-- post 2 -->
  <circle cx="92" cy="270" r="16" fill="#E1F5EE"/>
  <text x="92" y="275" text-anchor="middle" font-size="10" font-weight="600" fill="#1D9E75">SR</text>
  <text x="115" y="265" font-size="11" font-weight="600" fill="#2C2C2A">Sneha Rao</text>
  <text x="115" y="278" font-size="10" fill="#888780">Engineer · 5h ago</text>
  <rect x="78" y="292" width="196" height="30" rx="8" fill="#F1EFE8"/>
  <text x="176" y="313" text-anchor="middle" font-size="10" fill="#444441">Excited to join Quibe 🚀</text>
  <text x="82" y="342" font-size="10" fill="#888780">❤️ 89  💬 14  🔗 Share</text>
  <!-- badge -->
