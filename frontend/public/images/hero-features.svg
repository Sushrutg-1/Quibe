  <circle cx="92" cy="160" r="16" fill="#EEEDFE"/>
  <text x="92" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#534AB7">AK</text>
  <text x="115" y="155" font-size="11" font-weight="600" fill="#2C2C2A">Aryan Kulkarni</text>
  <text x="115" y="168" font-size="10" fill="#888780">Designer · 2h ago</text>
  <rect x="78" y="182" width="196" height="40" rx="8" fill="#F1EFE8"/>
