  <text x="663" y="220" text-anchor="middle" font-size="9" font-weight="600" fill="#085041">Remote ✓</text>
  <!-- job card 2 -->
  <rect x="626" y="236" width="198" height="76" rx="10" fill="#F1EFE8"/>
  <rect x="634" y="246" width="30" height="30" rx="6" fill="#D85A30"/>
  <text x="649" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#FAECE7">R</text>
  <text x="672" y="258" font-size="11" font-weight="600" fill="#2C2C2A">Full Stack Dev</text>
  <text x="672" y="270" font-size="10" fill="#888780">Razorpay · Mumbai</text>
  <text x="672" y="282" font-size="10" fill="#534AB7">₹22–30 LPA</text>
  <rect x="634" y="296" width="64" height="18" rx="9" fill="#FAEEDA"/>
  <text x="666" y="308" text-anchor="middle" font-size="9" font-weight="600" fill="#633806">Hybrid ✓</text>
  <!-- apply btn -->
  <rect x="634" y="322" width="198" height="34" rx="10" fill="#534AB7"/>
  <text x="733" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="white">Browse all jobs →</text>

  <!-- Bottom stats row -->
