  <text x="420" y="349" text-anchor="middle" font-size="9" font-weight="600" fill="#534AB7">AK</text>
  <circle cx="450" cy="344" r="13" fill="#E1F5EE"/>
  <text x="450" y="349" text-anchor="middle" font-size="9" font-weight="600" fill="#1D9E75">SR</text>
  <circle cx="480" cy="344" r="13" fill="#FAEEDA"/>
  <text x="480" y="349" text-anchor="middle" font-size="9" font-weight="600" fill="#BA7517">VP</text>
